# =============================================================================
# HMHP Experiment: H60 Primary + Regression Head (Magnitude-Aware)
# =============================================================================
#
# Extends the profit-threshold experiment with a regression head that predicts
# continuous bps returns alongside classification. This enables the backtester
# to filter trades by predicted magnitude: only enter when |predicted_bps| > breakeven.
#
# Changes from nvda_hmhp_40feat_h60_profit8bps.yaml:
#   - hmhp_use_regression: true (adds regression head to each decoder)
#   - hmhp_loss_weights.regression: 0.15 (MSE on continuous returns)
#   - Other classification weights slightly reduced to sum to 1.0
#
# =============================================================================

name: HMHP_NVDA_40feat_H60_Profit8bps_Regression
description: |
  Signal-First Pivot with regression. HMHP predicts both direction (classification)
  and magnitude (regression). Regression head outputs predicted bps return per horizon.
  At inference: trade only when |predicted_bps| > option breakeven cost.

data:
  data_dir: "../data/exports/nvda_xnas_128feat_profit8bps"
  feature_count: 128
  feature_preset: "short_term_40"
  labeling_strategy: tlob
  num_classes: 3
  horizon_idx: 1

  sequence:
    window_size: 100
    stride: 10

  normalization:
    strategy: hybrid
    eps: 1.0e-8
    clip_value: 10.0
    exclude_features: [93, 115]

model:
  model_type: hmhp
  input_size: 40
  num_classes: 3
  dropout: 0.1

  hmhp_horizons:
    - 10
    - 60
    - 300

  hmhp_cascade_mode: full
  hmhp_state_fusion: gate
  hmhp_encoder_type: tlob
  hmhp_encoder_hidden_dim: 64
  hmhp_num_encoder_layers: 2
  hmhp_decoder_hidden_dim: 32
  hmhp_state_dim: 32
  hmhp_use_confirmation: true
  hmhp_use_regression: true

  hmhp_loss_weights:
    H10: 0.08
    H60: 0.40
    H300: 0.12
    consistency: 0.05
    final: 0.10
    regression: 0.25

train:
  batch_size: 256
  learning_rate: 5.0e-4
  weight_decay: 0.01
  epochs: 30
  early_stopping_patience: 8
  gradient_clip_norm: 1.0
  scheduler: cosine
  num_workers: 0
  pin_memory: true
  seed: 42
  mixed_precision: false
  loss_type: weighted_ce
  use_class_weights: true
  task_type: multiclass

output_dir: outputs/experiments/nvda_hmhp_40feat_h60_profit8bps_regression
log_level: INFO

tags:
  - nvda
  - xnas
  - hmhp
  - 40-features
  - h60-primary
  - profit-threshold
  - regression-head
  - magnitude-aware
