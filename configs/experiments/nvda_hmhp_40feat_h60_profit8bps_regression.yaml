# =============================================================================
# HMHP Experiment: H60 Primary + Regression Head (Magnitude-Aware)
# =============================================================================
#
# Extends the profit-threshold experiment with a regression head that predicts
# continuous bps returns alongside classification. This enables the backtester
# to filter trades by predicted magnitude: only enter when |predicted_bps| > breakeven.
#
# The `hmhp_use_regression: true` switch activates a parallel regression head
# on the HMHP cascade outputs; `hmhp_loss_weights.regression: 0.25` weights
# the added regression loss term.
# =============================================================================
# Migrated to multi-base 2026-04-15 (Phase 3.5 Batch 2). Golden-fixture locked.
# Note: uses `hmhp_cascade_bare` (not regression variant) because model_type
# stays `hmhp` (classification with auxiliary regression head), not the
# dedicated `hmhp_regression` enum.
_base:
  - "../bases/models/hmhp_cascade_bare.yaml"
  - "../bases/datasets/nvda_40feat_short_term.yaml"
  - "../bases/labels/tlob_smoothed.yaml"
  - "../bases/train/classification_default.yaml"

name: HMHP_NVDA_40feat_H60_Profit8bps_Regression
description: |
  Signal-First Pivot with regression. HMHP predicts both direction (classification)
  and magnitude (regression). Regression head outputs predicted bps return per horizon.
  At inference: trade only when |predicted_bps| > option breakeven cost.
output_dir: outputs/experiments/nvda_hmhp_40feat_h60_profit8bps_regression
log_level: INFO
tags:
  - nvda
  - xnas
  - hmhp
  - 40-features
  - h60-primary
  - profit-threshold
  - regression-head
  - magnitude-aware

data:
  data_dir: "../data/exports/nvda_xnas_128feat_profit8bps"
  horizon_idx: 1      # H60 primary

model:
  hmhp_use_regression: true   # activates auxiliary regression head
  hmhp_horizons: [10, 60, 300]
  hmhp_loss_weights:
    H10: 0.08
    H60: 0.40
    H300: 0.12
    consistency: 0.05
    final: 0.10
    regression: 0.25          # weight for auxiliary regression loss

train:
  num_workers: 0
