# =============================================================================
# HMHP Experiment: 128-Feature Opportunity Labels (0DTE-Aligned)
# =============================================================================
#
# Same HMHP architecture as nvda_hmhp_128feat_h10_primary but with OPPORTUNITY
# labeling instead of TLOB. Opportunity labels detect PEAK returns within each
# horizon window — better match for 0DTE ATM options where any sufficient move
# during the holding period is profitable.
#
# Data differs only in `data_dir` (opportunity-labeled export, 30 bps threshold).
# =============================================================================
# Migrated to multi-base 2026-04-15 (Phase 3.5 Batch 2). Golden-fixture locked.
_base:
  - "../bases/models/hmhp_cascade_bare.yaml"
  - "../bases/datasets/nvda_xnas_128feat_full.yaml"
  - "../bases/labels/opportunity.yaml"
  - "../bases/train/classification_default.yaml"

name: HMHP_NVDA_128feat_Opportunity_H10
description: |
  HMHP on 233-day XNAS 128-feature export with Opportunity labels (30 bps).
  Tests whether peak-return detection improves 0DTE signal quality.
output_dir: outputs/experiments/nvda_hmhp_128feat_opportunity_h10
log_level: INFO
tags:
  - nvda
  - xnas
  - hmhp
  - 128-features
  - opportunity
  - 0dte-aligned
  - peak-return

data:
  data_dir: "../data/exports/nvda_xnas_128feat_opportunity"

model:
  hmhp_horizons: [10, 60, 300]
  hmhp_loss_weights:
    H10: 0.5
    H60: 0.25
    H300: 0.1
    consistency: 0.05
    final: 0.1
