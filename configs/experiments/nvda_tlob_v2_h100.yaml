# =============================================================================
# TLOB Experiment: V2 Dataset with Dynamic Threshold, H=100
# =============================================================================
#
# Trains TLOB on the V2 NVDA export (dynamic threshold labeling) at H=100.
# Uses global Z-score + BiN (matching TLOB repo preprocessing). Sibling of
# `repo_match_h50` — differs in horizon + data_dir (v2 export with dynamic
# threshold labeling).
# =============================================================================
# Migrated to multi-base 2026-04-15 (Phase 3.5 Batch 3). Uses dedicated
# `nvda_40feat_tlob_repo.yaml` dataset base (shared with repo_match_h50).
# Golden-fixture locked.
_base:
  - "../bases/models/tlob_paper_classification.yaml"
  - "../bases/datasets/nvda_40feat_tlob_repo.yaml"
  - "../bases/labels/tlob_smoothed.yaml"
  - "../bases/train/tlob_paper_classification_train.yaml"

name: TLOB_NVDA_V2_H100
description: |
  TLOB model on V2 dataset with dynamic threshold labeling.
  H=100 horizon for longer-term trend prediction.
  Global Z-score normalization + BiN layer.
output_dir: outputs/experiments/nvda_tlob_v2_h100
log_level: INFO
tags:
  - nvda
  - tlob
  - horizon-100
  - v2-dynamic-threshold
  - global-zscore
  - 40-features

data:
  data_dir: "../data/exports/nvda_tlob_repo_v2"
  horizon_idx: 3   # H=100

model:
  dropout: 0.0   # match official TLOB repo (no dropout)
