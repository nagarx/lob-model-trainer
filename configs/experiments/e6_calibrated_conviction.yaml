# E6: Prediction Calibration + High-Conviction Filtering
#
# Uses E5 best model (e5_60s_huber_nocvml, epoch 4, IC=0.380).
# No retraining -- post-hoc calibration only.
#
# Hypothesis: Rescaling predictions to match target variance (x3.73),
# then filtering to |calibrated| > 10 bps, should achieve ~90% win rate
# on ~28% of samples at Deep ITM breakeven=1.4 bps.
#
# Decision gates:
#   G1: Calibrated IC > 0.35 (calibration must preserve IC)
#   G2: Win rate at 10 bps threshold > 55%
#   G3: Option return > 0% at any threshold
#
# Reference:
#   E5 Comprehensive Statistical Report §7.1 (threshold analysis)
#   P0 Label-Execution Validation (win rate scaling)
#   IBKR COST_AUDIT (Deep ITM breakeven = 1.4 bps)

name: E6_Calibrated_Conviction
description: |
  E6: Prediction calibration (variance matching) + high-conviction filtering.
  Uses E5 best model checkpoint. No retraining.

# Source model (no retraining)
data:
  data_dir: "../data/exports/e5_timebased_60s"
  feature_count: 98
  labeling_strategy: regression
  num_classes: 3
  horizon_idx: 0
  sequence:
    window_size: 20
    stride: 1
  normalization:
    strategy: hybrid
    eps: 1.0e-8
    clip_value: 10.0
    exclude_features: [93]

model:
  model_type: tlob
  input_size: 98
  num_classes: 3
  dropout: 0.1
  task_type: regression
  regression_loss_type: huber
  regression_loss_delta: 12.6
  tlob_hidden_dim: 32
  tlob_num_layers: 2
  tlob_num_heads: 2
  tlob_mlp_expansion: 4.0
  tlob_use_sinusoidal_pe: true
  tlob_use_bin: true
  tlob_dataset_type: nvda
  tlob_use_cvml: false
  tlob_cvml_out_channels: 0

train:
  task_type: regression
  loss_type: huber
  use_class_weights: false
  batch_size: 128
  learning_rate: 5.0e-4
  weight_decay: 0.01
  epochs: 30
  early_stopping_patience: 5
  gradient_clip_norm: 1.0
  scheduler: cosine
  num_workers: 0
  pin_memory: false
  seed: 42
  mixed_precision: false

output_dir: outputs/experiments/e6_calibrated_conviction
log_level: INFO
tags: [e6, nvda, regression, h10, 60s, calibrated, conviction, deep-itm]
