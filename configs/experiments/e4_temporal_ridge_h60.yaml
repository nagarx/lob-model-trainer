# =============================================================================
# E4 Temporal Ridge: H60 (5-minute returns), 53 Temporal Features
# =============================================================================
#
# Baseline model on E4 time-based export (5-second sampling).
# Tests whether 53 hand-crafted temporal features capture the IC=0.083 signal.
#
# Prior result on event-based H10 (ABLATION_FINDINGS): IC=0.616 (91% of TLOB).
# This is the first temporal model on time-based data targeting H60.
#
# Decision gate (Rule 13): IC > single-feature IC (0.087) at H60.
# =============================================================================

name: TemporalRidge_E4_H60
description: |
  Temporal Ridge on E4 time-based data targeting H60 (5-minute returns).
  Tests whether temporal features add value over single-feature baseline.

data:
  data_dir: "../data/exports/e4_timebased_5s"
  feature_count: 98
  labeling_strategy: regression
  horizon_idx: 1  # H60 = 5 minutes (60 × 5s)

  sequence:
    window_size: 20
    stride: 1

model:
  model_type: temporal_ridge
  # Phase A.5.3i (2026-04-24): extra='forbid' on ModelConfig; hyperparameters
  # nested under `params:` (opaque passthrough to model factory).
  params:
    alpha: 1.0
    features:
      signal_indices: [85, 84, 86, 56, 45]
      top_k_signals: 3
      rolling_windows: [5, 10, 20]
      include_volatility: true
      include_momentum: true

train:
  task_type: regression
  loss_type: huber

output_dir: outputs/experiments/e4_temporal_ridge_h60
log_level: INFO

tags:
  - e4
  - temporal-ridge
  - h60
  - time-based
  - baseline
  - 5-second
