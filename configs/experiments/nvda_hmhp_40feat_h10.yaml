# =============================================================================
# HMHP Experiment: 40-Feature Short-Term Preset (Feature Selection Test)
# =============================================================================
#
# Tests whether the evidence-based 40-feature subset (short_term_40 preset)
# matches or exceeds the full 119-feature model at H10. The preset selects
# the 40 features with highest profiler IC; rest are zeroed out.
#
# Data = same XNAS 128-feat export as nvda_hmhp_128feat_h10_primary, but
# `feature_preset: short_term_40` reduces effective model input to 40.
# =============================================================================
# Migrated to multi-base 2026-04-15 (Phase 3.5 Batch 2). Golden-fixture locked.
_base:
  - "../bases/models/hmhp_cascade_bare.yaml"
  - "../bases/datasets/nvda_40feat_short_term.yaml"
  - "../bases/labels/tlob_smoothed.yaml"
  - "../bases/train/classification_default.yaml"

name: HMHP_NVDA_40feat_H10
description: |
  HMHP with short_term_40 preset (40 evidence-based features) on XNAS 128-feat export.
  Feature selection test: does fewer features = less noise and comparable accuracy?
output_dir: outputs/experiments/nvda_hmhp_40feat_h10
log_level: INFO
tags:
  - nvda
  - xnas
  - hmhp
  - 40-features
  - feature-selection
  - short-term-preset

data:
  data_dir: "../data/exports/nvda_xnas_128feat"

model:
  hmhp_horizons: [10, 60, 300]
  hmhp_loss_weights:
    H10: 0.5
    H60: 0.25
    H300: 0.1
    consistency: 0.05
    final: 0.1
