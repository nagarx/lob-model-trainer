# =============================================================================
# TLOB Experiment: EXACT MATCH with Official TLOB Repository
# =============================================================================
#
# EXACTLY reproduces the official TLOB repository preprocessing + hyperparameters.
# 40 raw LOB features (10 levels × 4), global Z-score normalization (one
# mean/std for all prices, one for all sizes — matches TLOB/utils/utils_data.py),
# BiN layer on top, `dropout: 0.0` (no-dropout paper baseline).
#
# Benchmark reference: reproduces the TLOB paper's FI-2010 experimental setup
# on NVDA data. Use as a sanity check that our pipeline matches published results.
# =============================================================================
# Migrated to multi-base 2026-04-15 (Phase 3.5 Batch 3). Uses dedicated
# `nvda_40feat_tlob_repo.yaml` dataset base (shared with v2_h100). Dropout
# override to 0.0 (TLOB-repo-match). Golden-fixture locked.
_base:
  - "../bases/models/tlob_paper_classification.yaml"
  - "../bases/datasets/nvda_40feat_tlob_repo.yaml"
  - "../bases/labels/tlob_smoothed.yaml"
  - "../bases/train/tlob_paper_classification_train.yaml"

name: TLOB_NVDA_REPO_MATCH_H50
description: |
  TLOB model with EXACT preprocessing matching official repository.
  Global Z-score normalization (all prices together, all sizes together).
  BiN layer for adaptive per-sample normalization on top.
  This is the CORRECT approach per TLOB paper and repo.
output_dir: outputs/experiments/nvda_tlob_repo_match_h50
log_level: INFO
tags:
  - nvda
  - tlob
  - horizon-50
  - tlob-repo-match
  - global-zscore
  - 40-features
  - official-preprocessing

data:
  data_dir: "../data/exports/nvda_tlob_repo_v1"
  horizon_idx: 2   # H=50

model:
  dropout: 0.0   # match official TLOB repo (no dropout)
