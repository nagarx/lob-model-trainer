# =============================================================================
# TLOB Experiment: Multi-Horizon H=100 (Long-term Prediction)
# =============================================================================
#
# Trains TLOB on 11-month NVDA dataset at H=100 (long-term event-based horizon,
# matches the DeepLOB paper benchmark). Sibling of h10_v1 differing only in
# `horizon_idx: 3` (H=100 is index 3 in export's horizon list).
# =============================================================================
# Migrated to multi-base 2026-04-15 (Phase 3.5 Batch 3). Golden-fixture locked.
_base:
  - "../bases/models/tlob_paper_classification.yaml"
  - "../bases/datasets/nvda_98feat_zscore_per_day.yaml"
  - "../bases/labels/tlob_smoothed.yaml"
  - "../bases/train/tlob_paper_classification_train.yaml"

name: TLOB_NVDA_H100_v1
description: |
  TLOB model with H=100 horizon on complete 11-month NVDA dataset.
  Long-term prediction experiment matching DeepLOB paper benchmark.
output_dir: outputs/experiments/nvda_tlob_h100_v1
log_level: INFO
tags:
  - nvda
  - tlob
  - horizon-100
  - multi-horizon
  - 11month
  - full-dataset
  - deeplob-benchmark

data:
  horizon_idx: 3   # H=100 (override labels/tlob_smoothed default of 0)
