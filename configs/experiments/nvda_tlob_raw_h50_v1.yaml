# =============================================================================
# TLOB Experiment: RAW Export + H=50 (BiN-Optimized)
# =============================================================================
#
# Trains TLOB on the RAW (unnormalized) NVDA 11-month export. BiN layer is
# the sole normalization mechanism. Matches the TLOB paper's intended data
# flow (no double normalization — pre-norm + BiN is problematic).
# =============================================================================
# Migrated to multi-base 2026-04-15 (Phase 3.5 Batch 3). Uses 3-base composition
# (dataset inline: unique `data_dir` = nvda_tlob_raw_v2 + normalization=none).
# Golden-fixture locked.
_base:
  - "../bases/models/tlob_paper_classification.yaml"
  - "../bases/labels/tlob_smoothed.yaml"
  - "../bases/train/tlob_paper_classification_train.yaml"

name: TLOB_NVDA_RAW_H50_v1
description: |
  TLOB model trained on RAW export (no pre-normalization).
  BiN layer handles all normalization with learnable parameters.
  This matches the TLOB paper's intended data flow.
output_dir: outputs/experiments/nvda_tlob_raw_h50_v1
log_level: INFO
tags:
  - nvda
  - tlob
  - horizon-50
  - raw-export
  - bin-normalization
  - no-double-norm
  - fixed-normalization

# Per-child data (raw export, BiN handles scaling)
data:
  data_dir: "../data/exports/nvda_tlob_raw_v2"
  feature_count: 98
  horizon_idx: 2   # H=50
  sequence:
    window_size: 100
    stride: 10
  normalization:
    strategy: none
    eps: 1.0e-8
    clip_value: null
    exclude_features: []

model:
  input_size: 98
