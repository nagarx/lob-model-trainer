# =============================================================================
# NVDA XGBoost Baseline — ARCX H60 (1 Minute Horizon)
# =============================================================================
#
# Cross-exchange comparison: same model on ARCX (NYSE Arca) data.
# Profiler found: ARCX OFI-return r is 14pp higher than XNAS at 1s.
# Expect: higher OFI importance on ARCX, similar overall accuracy.
#
# Usage:
#   python scripts/train_xgboost_baseline.py \
#       --config configs/experiments/nvda_xgboost_baseline_arcx_h60.yaml
# =============================================================================

# Phase A.5.3i (2026-04-24): schema-corrected.
# Pre-migration: top-level `experiment:`/`output:` blocks were silently dropped
# by dacite (ExperimentConfig has `name:`/`description:`/`output_dir:` at root,
# not wrapped). `model:` flat xgboost hyperparameters were also dropped
# (ModelConfig has `params:` for opaque passthrough).
# #PY-389 (2026-07-13): this file NO LONGER loads via ExperimentConfig.from_yaml
# — `model_type: xgboost` fail-fasts at ModelConfig construction (no canonical-
# trainer route; registry key is 'xgboost_lob'). The Usage route above
# (train_xgboost_baseline.py, raw-dict loader) is unaffected.
name: "NVDA XGBoost Baseline H60 — ARCX"
description: "Cross-exchange comparison: XGBoost on 119 features at 1-minute horizon (ARCX)"

data:
  data_dir: "../data/exports/nvda_arcx_128feat"
  feature_count: 128  # explicit (Phase 7 Stage 7.1 migration; required for FeatureSet SFC match)
  feature_set: nvda_analysis_ready_119_src128_v1  # Phase 7 Stage 7.1 (2026-04-18): migrated from `feature_preset: analysis_ready_128`
  horizon_idx: 3

model:
  model_type: xgboost
  # Phase A.5.3i: xgboost-specific hyperparameters nested under `params:`.
  params:
    n_estimators: 500
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    early_stopping_rounds: 50

output_dir: "outputs/xgboost_baseline_arcx_h60"
