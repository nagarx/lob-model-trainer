# =============================================================================
# Temporal Ridge Regression: H10, 53 Temporal Features
# =============================================================================
#
# Simple model that achieves IC=0.616 (91% of TLOB's 0.677) with 53 params.
# Tests whether the signal is in the features, not the architecture.
#
# From ablation findings (ABLATION_FINDINGS_2026_03_16.md):
#   L1 Temporal Ridge: R²=0.324, IC=0.616, DA=0.722
#   TLOB T=100:        R²=0.464, IC=0.677, DA=0.749
#
# =============================================================================

name: TemporalRidge_NVDA_H10
description: |
  Temporal Ridge regression on 53 hand-crafted features.
  Validates ablation finding: IC=0.616 with 53 params vs 693K TLOB.

data:
  data_dir: "../data/exports/nvda_xnas_128feat_regression"
  feature_count: 128
  labeling_strategy: regression
  horizon_idx: 0

  sequence:
    window_size: 100
    stride: 10

model:
  model_type: temporal_ridge
  alpha: 1.0

  features:
    signal_indices: [85, 84, 86, 56, 45]
    top_k_signals: 3
    rolling_windows: [5, 10, 20]
    include_volatility: true
    include_momentum: true

train:
  task_type: regression
  loss_type: huber

output_dir: outputs/experiments/nvda_temporal_ridge_h10
log_level: INFO

tags:
  - nvda
  - xnas
  - temporal-ridge
  - regression
  - 53-features
  - h10
  - simple-model
