# =============================================================================
# HMHP Experiment: 128-Feature H10 Primary (XNAS, profiler-aligned)
# =============================================================================
#
# First HMHP experiment on the profiler-aligned 128-feature XNAS export.
# Target: Exceed prior HMHP benchmark of 58.2% at H10 (from 116-feature run).
#
# Horizons [10, 60, 300] — H10 primary (signal r=0.30 per profiler), H60
# execution horizon, H300 strategic. Loss weights skewed toward H10.
# `analysis_ready_128` preset strips 9 dead features → input_size=119.
# =============================================================================
# Migrated to multi-base 2026-04-15 (Phase 3.5 Batch 2). Canonical HMHP classif.
# Golden-fixture locked.
_base:
  - "../bases/models/hmhp_cascade_bare.yaml"
  - "../bases/datasets/nvda_xnas_128feat_full.yaml"
  - "../bases/labels/tlob_smoothed.yaml"
  - "../bases/train/classification_default.yaml"

name: HMHP_NVDA_128feat_H10_Primary
description: |
  HMHP on 233-day XNAS 128-feature export (profiler-aligned).
  Primary focus on H10, with H60/H300 for multi-horizon context.
output_dir: outputs/experiments/nvda_hmhp_128feat_xnas_h10
log_level: INFO
tags:
  - nvda
  - xnas
  - hmhp
  - 128-features
  - mlofi
  - multi-horizon
  - h10-primary
  - profiler-aligned

data:
  data_dir: "../data/exports/nvda_xnas_128feat"

model:
  hmhp_horizons: [10, 60, 300]
  hmhp_loss_weights:
    H10: 0.5
    H60: 0.25
    H300: 0.1
    consistency: 0.05
    final: 0.1
