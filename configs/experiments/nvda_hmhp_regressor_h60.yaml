# =============================================================================
# HMHP Regressor: Pure Regression, H60 Primary, 40-Feature Subset
# =============================================================================
#
# Pure regression experiment predicting continuous bps forward returns at H60.
# Uses the HierarchicalMultiHorizonRegressor (HMHP-R) model — dedicated
# `hmhp_regression` enum distinct from `hmhp` + auxiliary regression head.
#
# 40-feature short_term preset (input_size=40). H60-primary loss weighting
# matches the 0DTE execution horizon. No `final` weight (regression variant
# uses 4-key loss_weights: 3 horizons + consistency).
# =============================================================================
# Migrated to multi-base 2026-04-15 (Phase 3.5 Batch 2). Uses
# `hmhp_cascade_regression` (chains from bare, adds model_type=hmhp_regression
# + hmhp_regression_loss_type=huber). Golden-fixture locked.
_base:
  - "../bases/models/hmhp_cascade_regression.yaml"
  - "../bases/datasets/nvda_40feat_short_term.yaml"
  - "../bases/labels/regression_huber.yaml"
  - "../bases/train/regression_default.yaml"

name: HMHP_NVDA_Regressor_H60
description: |
  Pure regression HMHP predicting continuous forward returns in bps at H60.
  Loss: Huber (robust to outlier returns). Metrics: R², IC, MAE.
output_dir: outputs/experiments/nvda_hmhp_regressor_h60
log_level: INFO
tags:
  - nvda
  - xnas
  - hmhp-regression
  - pure-regression
  - 40-features
  - h60-primary
  - huber-loss
  - continuous-bps

data:
  data_dir: "../data/exports/nvda_xnas_128feat_regression"
  horizon_idx: 1              # H60 primary (override labels/regression_huber default of 0)

model:
  hmhp_horizons: [10, 60, 300]
  hmhp_loss_weights:          # regression uses 4-key (no `final` head)
    H10: 0.10
    H60: 0.50                 # H60 primary
    H300: 0.15
    consistency: 0.25

train:
  batch_size: 256             # override regression_default's 128
  early_stopping_patience: 8  # override regression_default's 5
  pin_memory: true            # override regression_default's false
