# =============================================================================
# NVDA XGBoost Baseline — XNAS H60 (1 Minute Horizon)
# =============================================================================
#
# First model experiment: XGBoost on 128 features at the 1-minute horizon.
# Purpose: Validate feature importance matches profiler signal hierarchy
# before investing in deep temporal models.
#
# Feature preset: analysis_ready_128 (119 features, 9 dead excluded)
# Horizon: index 3 = H60 = 60 event steps ≈ 1 minute
#
# Expected accuracy: 38-42% on 3-class (random baseline = 33.3%)
# Walk-forward baseline: 42.5% (from generalization analyzer)
#
# Usage:
#   python scripts/train_xgboost_baseline.py \
#       --config configs/experiments/nvda_xgboost_baseline_h60.yaml
# =============================================================================

experiment:
  name: "NVDA XGBoost Baseline H60 — XNAS"
  description: "First model experiment: XGBoost on 119 features at 1-minute horizon (XNAS)"

data:
  data_dir: "../data/exports/nvda_xnas_128feat"
  feature_preset: "analysis_ready_128"
  horizon_idx: 3  # H60 = 1 minute

model:
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  early_stopping_rounds: 50

output:
  output_dir: "outputs/xgboost_baseline_xnas_h60"
