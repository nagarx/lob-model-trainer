# =============================================================================
# TLOB Experiment: H=50 (Medium-term Prediction) - RECOMMENDED FIRST TEST
# =============================================================================
#
# Trains TLOB on 11-month NVDA dataset at H=50 (medium-term event-based horizon)
# with NO pre-normalization — BiN layer handles all scaling. Recommended first
# architecture-validation test per EXPERIMENT_INDEX.
# =============================================================================
# Migrated to multi-base 2026-04-15 (Phase 3.5 Batch 3). Uses 3-base composition
# (dataset inline because `normalization=none` doesn't fit any dataset base
# cleanly). Golden-fixture locked.
_base:
  - "../bases/models/tlob_paper_classification.yaml"
  - "../bases/labels/tlob_smoothed.yaml"
  - "../bases/train/tlob_paper_classification_train.yaml"

name: TLOB_NVDA_H50_v1
description: |
  TLOB model with H=50 horizon on complete 11-month NVDA dataset.
  Medium-term prediction with balanced class distribution.
  RECOMMENDED first training test for architecture validation.
output_dir: outputs/experiments/nvda_tlob_h50_v1
log_level: INFO
tags:
  - nvda
  - tlob
  - horizon-50
  - multi-horizon
  - 11month
  - balanced-classes
  - first-test

# Per-child data (no-normalization variant: BiN handles all scaling)
data:
  data_dir: "../data/exports/nvda_11month_complete"
  feature_count: 98
  horizon_idx: 2   # H=50
  sequence:
    window_size: 100
    stride: 10
  normalization:
    strategy: none
    eps: 1.0e-8
    clip_value: null
    exclude_features: []

model:
  input_size: 98
