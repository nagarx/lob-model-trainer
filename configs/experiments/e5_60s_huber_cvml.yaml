# =============================================================================
# E5 Phase 2: TLOB + CVML Regression — 60s bins, H10 (10 min), Huber
# =============================================================================
# Tests whether CVML cross-feature mixing improves over baseline TLOB.
# CVML: 98 -> 49 features via 5 dilated causal Conv1D layers.
# Li et al. ICLR 2025: +244.9% R2 on MPRF benchmark.
# =============================================================================
# Migrated to multi-base 2026-04-15 (Phase 3.5 Batch 1). Golden-fixture locked.
_base:
  - "../bases/models/tlob_compact_regression.yaml"
  - "../bases/datasets/nvda_e5_60s.yaml"
  - "../bases/labels/regression_huber.yaml"
  - "../bases/train/regression_default.yaml"

name: E5_60s_Huber_CVML
description: |
  E5 Phase 2 CVML test: TLOB + CVML on 60s data at H10 (10 min).
  Tests if CVML feature mixing improves IC/DA over no-CVML baseline.
output_dir: outputs/experiments/e5_60s_huber_cvml
log_level: INFO
tags: [e5, nvda, regression, h10, 60s, huber, cvml]

# Per-child overrides: enable CVML
model:
  tlob_use_cvml: true
  tlob_cvml_out_channels: 49
