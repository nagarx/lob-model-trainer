# =============================================================================
# HMHP-R Regression: Multi-Horizon [10, 60, 300], H10 Primary
# =============================================================================
#
# Phase 3: Multi-horizon regression following successful TLOB single-horizon
# result (R²=0.464, IC=0.677, DA=0.749 at H10). Tests whether multi-horizon
# cascade improves IC over single-horizon TLOB.
#
# 128-FEATURE NO-PRESET edge case: uses full 128 features (input_size=128)
# without any feature preset. My `nvda_xnas_128feat_full.yaml` dataset base
# cannot be used here (it sets `feature_preset: analysis_ready_128` and
# `input_size: 119`). So this config uses a 3-base composition and keeps
# its dataset block inline — the only HMHP config that sidesteps the
# dataset axis.
# =============================================================================
# Migrated to multi-base 2026-04-15 (Phase 3.5 Batch 2). 3-base composition
# (models + labels + train; dataset inline). Golden-fixture locked.
_base:
  - "../bases/models/hmhp_cascade_regression.yaml"
  - "../bases/labels/regression_huber.yaml"
  - "../bases/train/regression_default.yaml"

name: HMHP_NVDA_Regression_H10_Primary
description: |
  Multi-horizon regression: HMHP-R predicts continuous bps returns at H10/H60/H300.
  H10-primary weighting per signal strength analysis.
output_dir: outputs/experiments/nvda_hmhp_regression_h10_primary
log_level: INFO
tags:
  - nvda
  - xnas
  - hmhp-regression
  - multi-horizon
  - 128-features
  - h10-primary
  - huber-loss

# Per-child data (edge case: no feature_preset — uses full 128 features)
data:
  data_dir: "../data/exports/nvda_xnas_128feat_regression"
  feature_count: 128
  sequence:
    window_size: 100
    stride: 10
  normalization:
    strategy: hybrid
    eps: 1.0e-8
    clip_value: 10.0
    exclude_features: [93, 115]

model:
  input_size: 128              # no preset — full 128 features
  hmhp_horizons: [10, 60, 300]
  hmhp_loss_weights:           # regression uses 4-key (no `final` head)
    H10: 0.50                  # H10 primary
    H60: 0.25
    H300: 0.15
    consistency: 0.10

train:
  epochs: 20                   # override regression_default's 30
  early_stopping_patience: 8   # override regression_default's 5
