# =============================================================================
# E5 Phase 2: TLOB + CVML Regression — 30s bins, H10 (5 min), Huber
# =============================================================================
# BEST COMBO TEST: CVML feature mixing + 4x more data from 30s bins.
# Combines data quantity advantage (132K seqs) with CVML signal amplification.
# If this beats all other configs, it validates both changes simultaneously.
# =============================================================================

name: E5_30s_Huber_CVML
description: |
  E5 Phase 2 best-combo test: TLOB + CVML on 30s bins at H10 (5 min).
  Combines 4x data (vs 60s) with CVML cross-feature mixing.

data:
  data_dir: "../data/exports/e5_timebased_30s"
  feature_count: 98
  labeling_strategy: regression
  num_classes: 3
  horizon_idx: 0
  sequence:
    window_size: 20
    stride: 1
  normalization:
    strategy: hybrid
    eps: 1.0e-8
    clip_value: 10.0
    exclude_features: [93]

model:
  model_type: tlob
  input_size: 98
  num_classes: 3
  dropout: 0.1
  task_type: regression
  regression_loss_type: huber
  regression_loss_delta: 15.1
  tlob_hidden_dim: 32
  tlob_num_layers: 2
  tlob_num_heads: 2
  tlob_mlp_expansion: 4.0
  tlob_use_sinusoidal_pe: true
  tlob_use_bin: true
  tlob_dataset_type: nvda
  tlob_use_cvml: true
  tlob_cvml_out_channels: 49

train:
  task_type: regression
  loss_type: huber
  use_class_weights: false
  batch_size: 128
  learning_rate: 5.0e-4
  weight_decay: 0.01
  epochs: 30
  early_stopping_patience: 5
  gradient_clip_norm: 1.0
  scheduler: cosine
  num_workers: 0
  pin_memory: false
  seed: 42
  mixed_precision: false

output_dir: outputs/experiments/e5_30s_huber_cvml
log_level: INFO
tags: [e5, nvda, regression, h10, 30s, huber, cvml, best-combo]
