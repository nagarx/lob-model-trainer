# =============================================================================
# TLOB Regression: E4 Time-Based, H60 (5-minute returns), 98 Features
# =============================================================================
#
# PHASE 3 of E4 experiment. First deep learning model on time-based data.
# Time-based 5-second sampling unlocked IC=0.083-0.089 at H60, which was
# ZERO in all 7 prior event-based experiments.
#
# MODEL: TLOB (Berti & Kasneci 2025) with regression head
#   - Same architecture as proven REG-01 (2L/32H/2Heads)
#   - BiN normalization for raw (unnormalized) features
#   - Regression head: shared trunk → Linear(total_dim, 1)
#   - Huber loss with delta=7.3 bps (calibrated from E4 H60 distribution)
#
# DATA: e4_timebased_5s export (time-based 5-second sampling)
#   - 233 trading days, 1,396,603 sequences [N, 20, 98]
#   - Regression labels [N, 3] float64 (H10=50s, H60=5min, H300=25min)
#   - Using horizon_idx=1 (H60: IC=0.085-0.091 cross-split, CV=2-3%)
#
# STATISTICAL CALIBRATION (from E4_COMPREHENSIVE_ANALYSIS_2026_03.md):
#   - H60 return std: 22.41 bps (train), 20.49 bps (test)
#   - H60 kurtosis: 33.4 (moderate → Huber over MSE)
#   - Huber delta: 7.3 bps (consistent 7.1-7.4 across 3 splits)
#   - Signal half-life: 5 timesteps = 25 seconds
#   - Walk-forward IC stability: 15.22 (highest in pipeline history)
#   - Feature saturation: 4 features (DEPTH_NORM_OFI captures 95.7% of R²)
#
# BASELINES (from e4_phase2_baselines_2026_03.md):
#   - Single feature IC = 0.089 (DEPTH_NORM_OFI only)
#   - Linear Ridge IC = 0.091 (98 raw features)
#   - TemporalRidge IC = 0.121 (53 temporal features, 36% above single)
#   - TemporalGradBoost IC = 0.073 (overfits on this data)
#
# ABLATION JUSTIFICATION (from ABLATION_FINDINGS_2026_03_16.md):
#   - T=20 retains 99.6% of IC vs T=100 (0.674 vs 0.677)
#   - T=20 uses 7.4× fewer parameters (93.7K vs 693K)
#   - Signal half-life = 5 steps → T=20 is theoretically optimal
#
# SUCCESS CRITERIA (decision gates):
#   - G5: Test IC > 0.121 (beat TemporalRidge baseline)
#   - G6: Test R² > 0.013 (beat Ridge R² baseline)
#   - G7: |Val IC - Test IC| / Test IC < 10% (no overfitting)
#   - G8: Best epoch < 30 (reasonable convergence)
#
# =============================================================================

name: TLOB_E4_H60_TimeBased
description: |
  E4 Phase 3: TLOB regression on time-based 5-second data at H60.
  First deep learning model on time-based sampled data.
  Must beat TemporalRidge IC=0.121 baseline.
  Huber delta=7.3 calibrated from E4 H60 return distribution.

# =============================================================================
# Data Configuration
# =============================================================================
data:
  data_dir: "../data/exports/e4_timebased_5s"
  feature_count: 98
  labeling_strategy: regression
  num_classes: 3

  # H60 = index 1 in horizons [10, 60, 300]
  # H60 = 60 × 5s = 300 seconds = 5 minutes
  horizon_idx: 1

  sequence:
    window_size: 20    # 20 × 5s = 100 seconds of history
    stride: 1          # Every 5-second sample (matches E4 export)

  normalization:
    strategy: hybrid
    eps: 1.0e-8
    clip_value: 10.0
    exclude_features: [93]        # time_regime (categorical). Note: time_bucket(115) not in 98-feature export

# =============================================================================
# Model Configuration (TLOB Regression)
# =============================================================================
model:
  model_type: tlob
  input_size: 98       # E4 has 98 stable features (no experimental)
  num_classes: 3       # Required by schema (unused in regression mode)
  dropout: 0.1

  # Regression
  task_type: regression
  regression_loss_type: huber
  regression_loss_delta: 7.3     # E4-calibrated (not 5.0 from event-based H10)

  # TLOB architecture — same proven config as REG-01
  # Adapted: input_size 128→98, but hidden/layers/heads unchanged
  tlob_hidden_dim: 32
  tlob_num_layers: 2
  tlob_num_heads: 2
  tlob_mlp_expansion: 4.0
  tlob_use_sinusoidal_pe: true
  tlob_use_bin: true
  tlob_dataset_type: nvda

# =============================================================================
# Training Configuration
# =============================================================================
train:
  task_type: regression
  loss_type: huber
  use_class_weights: false

  batch_size: 128
  learning_rate: 5.0e-4
  weight_decay: 0.01
  epochs: 50
  early_stopping_patience: 10
  gradient_clip_norm: 1.0
  scheduler: cosine
  num_workers: 0
  pin_memory: false
  seed: 42
  mixed_precision: false

# =============================================================================
# Output
# =============================================================================
output_dir: outputs/experiments/e4_tlob_h60
log_level: INFO

tags:
  - e4
  - nvda
  - xnas
  - tlob
  - regression
  - 98-features
  - h60
  - time-based
  - 5-second
  - huber-loss
  - delta-7.3bps
