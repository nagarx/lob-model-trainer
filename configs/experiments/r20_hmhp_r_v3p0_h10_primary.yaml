# Per-child overrides: HMHP-R requires hmhp_horizons + hmhp_loss_weights
# explicit per-experiment (Stage 6 precedent; not in base bare config)
model:
  hmhp_horizons: [10, 60, 300]   # matches v3p0 regression_labels.npy [N, 3]
  hmhp_primary_horizon_idx: 0    # H10 primary (idx 0); EXPLICIT per Phase 3
                                 # design Agent X anti-drift item — avoids
                                 # #PY-43/#PY-57/N4 dormant-bug horizons[0]
                                 # hardcoded paths AT primary_horizon_idx=0
                                 # semantic safety (closed in code per
                                 # Phase 1b.1 commit 83ab54c verification)
  hmhp_loss_weights:             # H10-primary weighting (Stage 6 exact)
    H10: 0.50
    H60: 0.25
    H300: 0.15
    consistency: 0.10            # cross-horizon consistency loss

train:
  # Production-scale overrides for R-17a/R-19 protocol parity:
  epochs: 100                    # OVERRIDE Stage 6's 20 (production scale)
  early_stopping_patience: 15    # OVERRIDE Stage 6's 8 (production scale)
  seed: 42                       # EXPLICIT (matches R-17a + R-19 + Stage 6
                                 # protocol; reproducibility lock)
  # num_workers=0 inherited from base regression_default.yaml + OOM-on-fork
  # guard with cache_in_memory=true (R-19 precedent at cycle10_r19_multi_seed.yaml:373)
  num_workers: 0
