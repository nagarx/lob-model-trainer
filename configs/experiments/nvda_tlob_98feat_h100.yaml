# =============================================================================
# TLOB Experiment: 98-Feature Dataset with Hybrid Normalization
# =============================================================================
#
# Trains TLOB on the 98-feature NVDA v2 export with hybrid normalization.
# Includes OFI, microprice, and other derived signals. `dropout: 0.0` matches
# the official TLOB repo no-dropout baseline.
# =============================================================================
# Migrated to multi-base 2026-04-15 (Phase 3.5 Batch 3). Uses 3-base composition
# (dataset inline: unique `nvda_98feat_v2` export + hybrid norm with exclude=[]).
# Dropout override to 0.0 (TLOB-repo-match). Golden-fixture locked.
_base:
  - "../bases/models/tlob_paper_classification.yaml"
  - "../bases/labels/tlob_smoothed.yaml"
  - "../bases/train/tlob_paper_classification_train.yaml"

name: TLOB_NVDA_98FEAT_H100
description: |
  TLOB model on 98-feature dataset with hybrid normalization.
  H=100 horizon for longer-term trend prediction.
  Includes OFI, microprice, and other derived signals.
output_dir: outputs/experiments/nvda_tlob_98feat_h100
log_level: INFO
tags:
  - nvda
  - tlob
  - horizon-100
  - 98-features
  - hybrid-normalization
  - ofi-signals
  - mbo-features

# Per-child data (98feat v2 export with hybrid normalization, no excludes)
data:
  data_dir: "../data/exports/nvda_98feat_v2"
  feature_count: 98
  horizon_idx: 3   # H=100
  sequence:
    window_size: 100
    stride: 10
  normalization:
    strategy: hybrid
    eps: 1.0e-8
    clip_value: 10.0
    exclude_features: []

model:
  input_size: 98
  dropout: 0.0   # match official TLOB repo (no dropout)
