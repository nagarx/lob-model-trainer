# =============================================================================
# HMHP Experiment: 40-Feature, H60 Primary, Profit-Threshold Labels (8 bps)
# =============================================================================
#
# Signal-First Pivot: trains on labels where every directional prediction
# corresponds to a price move exceeding the ATM option breakeven cost.
#
# Key changes from nvda_hmhp_40feat_h10.yaml:
#   - data_dir: profit-threshold-labeled data (8 bps fixed threshold)
#   - horizon_idx: 1 (H60 = column index 1 in [10, 60, 300])
#   - Loss weights: H60 primary (0.50), H10/H300 secondary
#   - num_workers: 0 (HMHP multiprocessing compatibility)
#
# Labeling:
#   TLOB fixed threshold = 0.0008 (8 bps)
#   H60 (~1 minute): Up = move > 8 bps, Down = move < -8 bps
#   Expected class balance: ~25% Down / 50% Stable / 25% Up (from test analysis)
#   Every directional label = profitable move at ATM 0DTE call breakeven (4.7 bps)
#
# Cost model (IBKR-validated, from IBKR_REAL_WORLD_TRADING_REPORT.md):
#   ATM 0DTE Call round-trip: $4.40 (breakeven: 4.9 bps on $180 stock)
#   ATM 0DTE Put round-trip: $3.40 (breakeven: 3.8 bps)
#   BSM theta at 14:00: 0.23 bps/min (negligible for 1-6 min holds)
#
# =============================================================================

name: HMHP_NVDA_40feat_H60_Profit8bps
description: |
  Signal-First Pivot experiment. HMHP with short_term_40 features trained on
  profit-threshold labels (8 bps fixed). H60 primary horizon — every "Up" or
  "Down" prediction now corresponds to a price move exceeding option breakeven.

data:
  data_dir: "../data/exports/nvda_xnas_128feat_profit8bps"
  feature_count: 128
  feature_preset: "short_term_40"
  labeling_strategy: tlob
  num_classes: 3
  horizon_idx: 1            # H60 = index 1 in horizons [10, 60, 300]

  sequence:
    window_size: 100
    stride: 10

  normalization:
    strategy: hybrid
    eps: 1.0e-8
    clip_value: 10.0
    exclude_features: [93, 115]

model:
  model_type: hmhp
  input_size: 40
  num_classes: 3
  dropout: 0.1

  hmhp_horizons:
    - 10
    - 60
    - 300

  hmhp_cascade_mode: full
  hmhp_state_fusion: gate
  hmhp_encoder_type: tlob
  hmhp_encoder_hidden_dim: 64
  hmhp_num_encoder_layers: 2
  hmhp_decoder_hidden_dim: 32
  hmhp_state_dim: 32
  hmhp_use_confirmation: true

  hmhp_loss_weights:
    H10: 0.10              # Secondary (short-term context)
    H60: 0.50              # PRIMARY — profit-threshold horizon
    H300: 0.15             # Secondary (trend)
    consistency: 0.10
    final: 0.15

train:
  batch_size: 256
  learning_rate: 5.0e-4
  weight_decay: 0.01
  epochs: 30
  early_stopping_patience: 8
  gradient_clip_norm: 1.0
  scheduler: cosine
  num_workers: 0            # HMHP requires num_workers=0 (dict labels)
  pin_memory: true
  seed: 42
  mixed_precision: false
  loss_type: weighted_ce
  use_class_weights: true
  task_type: multiclass

output_dir: outputs/experiments/nvda_hmhp_40feat_h60_profit8bps
log_level: INFO

tags:
  - nvda
  - xnas
  - hmhp
  - 40-features
  - h60-primary
  - profit-threshold
  - signal-first-pivot
  - 8bps-threshold
