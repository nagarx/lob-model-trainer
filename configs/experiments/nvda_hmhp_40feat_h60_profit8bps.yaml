# =============================================================================
# HMHP Experiment: 40-Feature, H60 Primary, Profit-Threshold Labels (8 bps)
# =============================================================================
#
# Signal-First Pivot: trains on labels where every directional prediction
# corresponds to a price move exceeding the ATM option breakeven cost.
# Data export's Up/Down labels are thresholded at |return| > 8 bps; Stable
# covers the rest.
#
# Horizon-weighted toward H60 (0.5 weight) since H60 is the execution horizon
# for 0DTE options. num_workers: 0 override (smaller batch of small features
# doesn't benefit from dataloader parallelism on this dataset).
# =============================================================================
# Migrated to multi-base 2026-04-15 (Phase 3.5 Batch 2). Golden-fixture locked.
_base:
  - "../bases/models/hmhp_cascade_bare.yaml"
  - "../bases/datasets/nvda_40feat_short_term.yaml"
  - "../bases/labels/tlob_smoothed.yaml"
  - "../bases/train/classification_default.yaml"

name: HMHP_NVDA_40feat_H60_Profit8bps
description: |
  Signal-First Pivot experiment. HMHP with short_term_40 features trained on
  profit-threshold labels (8 bps fixed). H60 primary horizon — every "Up" or
  "Down" prediction now corresponds to a price move exceeding option breakeven.
output_dir: outputs/experiments/nvda_hmhp_40feat_h60_profit8bps
log_level: INFO
tags:
  - nvda
  - xnas
  - hmhp
  - 40-features
  - h60-primary
  - profit-threshold
  - signal-first-pivot
  - 8bps-threshold

data:
  data_dir: "../data/exports/nvda_xnas_128feat_profit8bps"
  horizon_idx: 1      # H60 primary (overrides labels/tlob_smoothed default of 0)

model:
  hmhp_horizons: [10, 60, 300]
  hmhp_loss_weights:
    H10: 0.10
    H60: 0.50         # H60 primary — heaviest weight
    H300: 0.15
    consistency: 0.10
    final: 0.15

train:
  num_workers: 0      # override classification_default's 4
