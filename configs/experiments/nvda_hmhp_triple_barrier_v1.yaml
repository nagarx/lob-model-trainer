# =============================================================================
# HMHP Experiment: Triple Barrier Labeling (Multi-Horizon Risk-Managed Trading)
# =============================================================================
#
# This experiment trains HMHP on the complete 11-month NVDA dataset with
# Triple Barrier labeling for risk-managed trading decisions.
#
# MODEL: HMHP (Hierarchical Multi-Horizon Predictor)
# - Cascading multi-horizon prediction: H50 → H100 → H200
# - State passing from shorter to longer horizons
# - Cross-horizon confirmation for higher confidence signals
# - Native multi-task learning with per-horizon losses
#
# DATA: nvda_11month_triple_barrier export (98-feat, 234 days)
#
# LABELING: Triple Barrier (López de Prado 2018, Ch. 3)
#   Class 0 (StopLoss): Hit lower barrier → LOSING trade
#   Class 1 (Timeout): Neither barrier hit → DON'T TRADE
#   Class 2 (ProfitTarget): Hit upper barrier → WINNING trade
#
# HORIZON SEMANTICS for Triple Barrier (different from TLOB):
#   - Horizons are MAX HOLDING PERIODS, not price-direction points
#   - [H50, H100, H200] = max ticks to wait before Timeout
# =============================================================================
# Migrated to multi-base 2026-04-15 (Phase 3.5 Batch 2). Canonical TB config.
# Golden-fixture locked. Pre-migration was 223 LOC standalone → 25 LOC multi-base.
_base:
  - "../bases/models/hmhp_cascade_bare.yaml"
  - "../bases/datasets/nvda_98feat_triple_barrier.yaml"
  - "../bases/labels/triple_barrier_volscaled.yaml"
  - "../bases/train/classification_triple_barrier.yaml"

name: HMHP_NVDA_TripleBarrier_v1
description: |
  HMHP multi-horizon model with Triple Barrier labeling on 11-month NVDA dataset.
  Cascading state from H50 → H100 → H200 with cross-horizon confirmation.
output_dir: outputs/experiments/nvda_hmhp_triple_barrier_v1
log_level: INFO
tags:
  - nvda
  - hmhp
  - triple-barrier
  - multi-horizon
  - risk-managed
  - 11month
  - full-dataset
  - cascading
  - focal-loss

# Per-child overrides: TB-specific data_dir, horizons, and loss weights
data:
  data_dir: "../data/exports/nvda_11month_triple_barrier"

model:
  hmhp_horizons: [50, 100, 200]
  hmhp_loss_weights:
    H50: 0.35
    H100: 0.25
    H200: 0.15
    consistency: 0.10
    final: 0.15
