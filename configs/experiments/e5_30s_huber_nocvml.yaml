# =============================================================================
# E5 Phase 2: TLOB Regression — 30s bins, H10 (5 min), Huber, NO CVML
# =============================================================================
# DATA QUANTITY TEST: 4x more training data (132K vs 39K) at slightly lower IC.
# 30s/H10 IC=0.240 vs 60s/H10 IC=0.248 — trade-off: more data vs stronger signal.
# Huber delta=15.1 calibrated from 30s H10 kurtosis=12.6.
# Label overlap: 90% at stride=1 -> ~13K independent samples (3x more than 60s).
# =============================================================================
# Migrated to multi-base 2026-04-15 (Phase 3.5 Batch 1). Golden-fixture locked.
_base:
  - "../bases/models/tlob_compact_regression.yaml"
  - "../bases/datasets/nvda_e5_30s.yaml"
  - "../bases/labels/regression_huber.yaml"
  - "../bases/train/regression_default.yaml"

name: E5_30s_Huber_NoCVML
description: |
  E5 Phase 2 data-quantity test: TLOB on 30s bins at H10 (5 min), no CVML.
  Tests whether 4x more data compensates for slightly lower IC (0.240 vs 0.248).
output_dir: outputs/experiments/e5_30s_huber_nocvml
log_level: INFO
tags: [e5, nvda, regression, h10, 30s, huber, no-cvml, data-quantity]

# Per-child overrides: recalibrate delta for 30s kurtosis
model:
  regression_loss_delta: 15.1
