# =============================================================================
# HMHP Experiment: Triple Barrier with VOLATILITY-SCALED Per-Day Barriers
# =============================================================================
#
# Variant of nvda_hmhp_triple_barrier_v1 using volatility-scaled thresholds:
# barriers adapt to daily realized volatility so class distribution stays
# consistent across market regimes (normal / high-vol / low-vol days).
# Formula: barrier_day = barrier_base * clamp(vol_day / vol_ref, 0.3, 3.0)
# Expected distribution: ~20-25% PT, ~25-30% SL, ~45-55% TO across all splits.
#
# BASE BARRIERS (before per-day scaling):
# | Horizon | Profit Target | Stop Loss | R:R  |
# |---------|---------------|-----------|------|
# | H50     | 27.2 bps      | 18.1 bps  | 1.5:1|
# | H100    | 38.3 bps      | 25.5 bps  | 1.5:1|
# | H200    | 55.7 bps      | 37.1 bps  | 1.5:1|
#
# Data differs only in `data_dir` (points at volscaled export); model +
# training hyperparams identical to v1.
# =============================================================================
# Migrated to multi-base 2026-04-15 (Phase 3.5 Batch 2). Golden-fixture locked.
_base:
  - "../bases/models/hmhp_cascade_bare.yaml"
  - "../bases/datasets/nvda_98feat_triple_barrier.yaml"
  - "../bases/labels/triple_barrier_volscaled.yaml"
  - "../bases/train/classification_triple_barrier.yaml"

name: HMHP_NVDA_TripleBarrier_VolScaled
description: |
  HMHP multi-horizon model with VOLATILITY-SCALED per-day Triple Barrier thresholds.
  Barriers adapt to daily realized volatility for consistent class distribution
  across all market regimes. Cascading state from H50 → H100 → H200.
output_dir: outputs/experiments/nvda_hmhp_triple_barrier_volscaled
log_level: INFO
tags:
  - nvda
  - hmhp
  - triple-barrier
  - volatility-scaled
  - per-day-barriers
  - balanced-classes
  - multi-horizon
  - cascading
  - focal-loss

data:
  data_dir: "../data/exports/nvda_11month_triple_barrier_volscaled"

model:
  hmhp_horizons: [50, 100, 200]
  hmhp_loss_weights:
    H50: 0.35
    H100: 0.25
    H200: 0.15
    consistency: 0.10
    final: 0.15
