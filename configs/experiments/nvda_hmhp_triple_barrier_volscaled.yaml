# =============================================================================
# HMHP Experiment: Volatility-Scaled Triple Barrier Labeling
# =============================================================================
#
# This experiment trains HMHP on the 11-month NVDA dataset with VOLATILITY-
# ADAPTIVE per-day Triple Barrier thresholds.
#
# KEY DIFFERENCE FROM calibrated config:
# - Barriers are scaled per-day based on realized volatility
# - Formula: barrier_day = barrier_base * clamp(vol_day / vol_ref, 0.3, 3.0)
# - Expected class distribution: ~20-25% PT, ~25-30% SL, ~45-55% TO
#   across ALL splits (train, val, test) regardless of market regime
#
# BASE BARRIERS (before per-day scaling):
# | Horizon | Profit Target | Stop Loss | R:R  |
# |---------|---------------|-----------|------|
# | H50     | 27.2 bps      | 18.1 bps  | 1.5:1|
# | H100    | 38.3 bps      | 25.5 bps  | 1.5:1|
# | H200    | 55.7 bps      | 37.1 bps  | 1.5:1|
#
# VOLATILITY SCALING:
# - Reference volatility: 0.000659 (median of 164 training days)
# - Scaling range: [0.3x, 3.0x] (observed: 0.61x - 2.87x)
# - Low-vol days get tighter barriers → more PT/SL hits
# - High-vol days get wider barriers → fewer false triggers
#
# MODEL: HMHP (Hierarchical Multi-Horizon Predictor)
# DATA: nvda_11month_triple_barrier_volscaled export
#
# RESEARCH REFERENCE:
# López de Prado, M. (2018). "Advances in Financial Machine Learning", Ch. 3.
# =============================================================================

name: HMHP_NVDA_TripleBarrier_VolScaled
description: |
  HMHP multi-horizon model with VOLATILITY-SCALED per-day Triple Barrier thresholds.
  Barriers adapt to daily realized volatility for consistent class distribution
  across all market regimes. Cascading state from H50 → H100 → H200.

# =============================================================================
# Data Configuration
# =============================================================================
data:
  data_dir: "../data/exports/nvda_11month_triple_barrier_volscaled"
  feature_count: 98

  labeling_strategy: triple_barrier
  num_classes: 3

  sequence:
    window_size: 100
    stride: 10

  normalization:
    strategy: hybrid
    eps: 1.0e-8
    clip_value: 10.0
    exclude_features: [93]  # TIME_REGIME is categorical

# =============================================================================
# Model Configuration (HMHP)
# =============================================================================
model:
  model_type: hmhp
  input_size: 98
  num_classes: 3
  dropout: 0.1

  hmhp_horizons: [50, 100, 200]
  hmhp_cascade_mode: full
  hmhp_state_fusion: gate
  hmhp_encoder_type: tlob
  hmhp_encoder_hidden_dim: 64
  hmhp_num_encoder_layers: 2
  hmhp_decoder_hidden_dim: 32
  hmhp_state_dim: 32
  hmhp_use_confirmation: true

  hmhp_loss_weights:
    H50: 0.35
    H100: 0.25
    H200: 0.15
    consistency: 0.10
    final: 0.15

# =============================================================================
# Training Configuration
# =============================================================================
train:
  batch_size: 64
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  epochs: 100
  early_stopping_patience: 15
  gradient_clip_norm: 1.0
  scheduler: cosine
  num_workers: 4
  pin_memory: true
  seed: 42
  mixed_precision: false

  # With volatility-scaled balanced classes, focal loss is a safety net
  # rather than a necessity. Class weights still help with residual imbalance.
  loss_type: focal
  focal_gamma: 2.0
  use_class_weights: true

  task_type: multiclass

# =============================================================================
# Output Configuration
# =============================================================================
output_dir: outputs/experiments/nvda_hmhp_triple_barrier_volscaled
log_level: INFO

tags:
  - nvda
  - hmhp
  - triple-barrier
  - volatility-scaled
  - per-day-barriers
  - balanced-classes
  - multi-horizon
  - cascading
  - focal-loss

# =============================================================================
# EXPECTED RESULTS WITH VOLATILITY-SCALED BARRIERS
# =============================================================================
#
# With per-day volatility scaling, class distribution should be roughly
# consistent across ALL splits:
#
# | Split | Profit Target | Stop Loss | Timeout |
# |-------|---------------|-----------|---------|
# | Train | ~20-25%       | ~25-30%   | ~45-55% |
# | Val   | ~20-25%       | ~25-30%   | ~45-55% |
# | Test  | ~20-25%       | ~25-30%   | ~45-55% |
#
# GOOD SIGNS (model is learning):
# - val_accuracy in 45-55% (not majority class collapse)
# - val_profittarget_precision > 40% (better than random ~25%)
# - val_agreement_ratio varies across batches (not always 1.0)
# - Loss decreases over epochs for all horizons
# - All three classes appear in predictions
#
# BAD SIGNS (model not learning):
# - val_accuracy stuck at ~50% (predicting all Timeout)
# - val_profittarget_precision ~ 25% (random guessing)
# - Only class 1 (Timeout) in predictions
#
# TARGET METRICS:
# - val_profittarget_precision > 50% (profitable trading signal)
# - val_predicted_trade_win_rate > 40% (break-even at 40% with 1.5:1 R:R)
# - val_decisive_prediction_rate > 30% (model makes clear predictions)
# =============================================================================
