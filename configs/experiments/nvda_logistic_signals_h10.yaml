# =============================================================================
# LogisticLOB Signals Only - Horizon 10 (Short-Term)
# =============================================================================
#
# Purpose: Test if the 8 core trading signals have predictive power at
# the shortest horizon where correlation analysis showed strongest signal.
#
# Signals used (correlation at H=10):
#   84: TRUE_OFI            (r ≈ +0.25)
#   85: DEPTH_NORM_OFI      (r = +0.295) <- strongest predictor
#   86: EXECUTED_PRESSURE   (r ≈ +0.20)
#   87: SIGNED_MP_DELTA_BPS (r ≈ +0.15)
#   88: TRADE_ASYMMETRY     (r = +0.278) <- second strongest
#   89: CANCEL_ASYMMETRY    (r ≈ +0.10)
#   90: FRAGILITY_SCORE     (r ≈ +0.05)
#   91: DEPTH_ASYMMETRY     (r ≈ +0.12)
#
# Expected outcome:
#   - If signals alone achieve >40% accuracy, they carry real predictive info
#   - Compare with full 98-feature model to see value of additional features
#
# Reference: RULE.md §0 (Research-Backed Implementation)
# =============================================================================

name: "nvda_logistic_signals_h10"
description: "LogisticLOB using only 8 core trading signals at H=10"

tags:
  - "baseline"
  - "logistic"
  - "signals_only"
  - "horizon_10"
  - "short_term"

data:
  data_dir: "../data/exports/nvda_98feat_v2"
  feature_count: 98
  horizon_idx: 0  # H=10 (1 second ahead)
  
  sequence:
    window_size: 100
    stride: 10
  
  normalization:
    strategy: "hybrid"
    eps: 1e-8
    clip_value: 10.0
    exclude_features: [92, 93, 94, 96, 97]
  
  labeling_strategy: "tlob"
  num_classes: 3
  cache_in_memory: true

model:
  model_type: "logistic"
  input_size: 98
  num_classes: 3
  dropout: 0.0
  
  logistic_pooling: "last"
  logistic_feature_indices: [84, 85, 86, 87, 88, 89, 90, 91]  # Core signals

train:
  batch_size: 512
  learning_rate: 1e-2
  weight_decay: 1e-4
  epochs: 30
  early_stopping_patience: 10
  gradient_clip_norm: null
  
  scheduler: "cosine"
  num_workers: 4
  pin_memory: true
  seed: 42
  
  loss_type: "weighted_ce"
  use_class_weights: true
  task_type: "multiclass"

output_dir: "outputs/logistic_signals_h10"
log_level: "INFO"
