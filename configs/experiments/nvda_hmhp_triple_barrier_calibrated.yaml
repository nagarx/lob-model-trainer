# =============================================================================
# HMHP Experiment: Triple Barrier with CALIBRATED Per-Horizon Barriers
# =============================================================================
#
# Variant of nvda_hmhp_triple_barrier_v1 using per-horizon calibrated
# thresholds — barriers chosen so class distributions hit ~25% ProfitTarget /
# ~25% StopLoss / ~50% Timeout, improving class balance and downstream
# metric stability. Calibrated on validation set.
#
# CALIBRATION:
# | Horizon | Profit Target | Stop Loss | R:R  |
# |---------|---------------|-----------|------|
# | H50     | 28 bps        | 19 bps    | 1.5:1|
# | H100    | 39 bps        | 26 bps    | 1.5:1|
# | H200    | 59 bps        | 40 bps    | 1.5:1|
#
# Data differs only in `data_dir`; model + training hyperparams identical to v1.
# =============================================================================
# Migrated to multi-base 2026-04-15 (Phase 3.5 Batch 2). Golden-fixture locked.
_base:
  - "../bases/models/hmhp_cascade_bare.yaml"
  - "../bases/datasets/nvda_98feat_triple_barrier.yaml"
  - "../bases/labels/triple_barrier_volscaled.yaml"
  - "../bases/train/classification_triple_barrier.yaml"

name: HMHP_NVDA_TripleBarrier_Calibrated
description: |
  HMHP multi-horizon model with CALIBRATED per-horizon Triple Barrier thresholds.
  Barriers calibrated to achieve balanced class distribution (~25% PT, ~25% SL, ~50% TO).
  Cascading state from H50 → H100 → H200 with cross-horizon confirmation.
output_dir: outputs/experiments/nvda_hmhp_triple_barrier_calibrated
log_level: INFO
tags:
  - nvda
  - hmhp
  - triple-barrier
  - calibrated
  - per-horizon-barriers
  - balanced-classes
  - multi-horizon
  - cascading
  - focal-loss

data:
  data_dir: "../data/exports/nvda_11month_triple_barrier_calibrated"

model:
  hmhp_horizons: [50, 100, 200]
  hmhp_loss_weights:
    H50: 0.35
    H100: 0.25
    H200: 0.15
    consistency: 0.10
    final: 0.15
