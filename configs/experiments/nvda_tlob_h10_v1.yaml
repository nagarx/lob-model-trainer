# =============================================================================
# TLOB Experiment: Multi-Horizon H=10 (Short-term Prediction)
# =============================================================================
#
# Trains TLOB (Transformer LOB, Berti & Kasneci 2025 paper-spec) on the
# complete 11-month NVDA dataset at the shortest event-based horizon (H=10).
# Canonical baseline for Batch 3 TLOB paper-classification family.
# =============================================================================
# Migrated to multi-base 2026-04-15 (Phase 3.5 Batch 3). Canonical TLOB classif.
# Golden-fixture locked. No per-child overrides needed (all defaults match).
_base:
  - "../bases/models/tlob_paper_classification.yaml"
  - "../bases/datasets/nvda_98feat_zscore_per_day.yaml"
  - "../bases/labels/tlob_smoothed.yaml"
  - "../bases/train/tlob_paper_classification_train.yaml"

name: TLOB_NVDA_H10_v1
description: |
  TLOB model with H=10 horizon on complete 11-month NVDA dataset.
  Short-term prediction experiment for immediate price movement.
output_dir: outputs/experiments/nvda_tlob_h10_v1
log_level: INFO
tags:
  - nvda
  - tlob
  - horizon-10
  - multi-horizon
  - 11month
  - full-dataset
