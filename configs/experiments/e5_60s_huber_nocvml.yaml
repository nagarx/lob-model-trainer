# =============================================================================
# E5 Phase 2: TLOB Regression — 60s bins, H10 (10 min), Huber, NO CVML
# =============================================================================
# BASELINE: Same architecture as E4 (92K params) on 60s time-based data.
# Must beat TemporalRidge IC=0.306 to justify deep learning.
# Huber delta=12.6 calibrated from kurtosis=26.5 (ReturnDistributionAnalyzer).
# Label overlap: 90% at stride=1 -> ~4K independent samples. Expect early overfit.
# =============================================================================
# Migrated to multi-base 2026-04-15 (Phase 3.5 Batch 1). Effective resolved
# dict is byte-identical to pre-migration form (locked by golden fixture
# at tests/fixtures/golden/experiments/e5_60s_huber_nocvml.json).
_base:
  - "../bases/models/tlob_compact_regression.yaml"
  - "../bases/datasets/nvda_e5_60s.yaml"
  - "../bases/labels/regression_huber.yaml"
  - "../bases/train/regression_default.yaml"

# Per-child identity (§3.4 orphans: name, description, output_dir, log_level, tags)
name: E5_60s_Huber_NoCVML
description: |
  E5 Phase 2 baseline: TLOB regression on 60s time-based data at H10 (10 min).
  Establishes deep learning baseline on highest-IC bin (0.248).
  Must beat TemporalRidge IC=0.306 baseline.
output_dir: outputs/experiments/e5_60s_huber_nocvml
log_level: INFO
tags: [e5, nvda, regression, h10, 60s, huber, no-cvml, baseline]
