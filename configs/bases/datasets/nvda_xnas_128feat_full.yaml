# axis: datasets
# NVDA 128-feat full analysis_ready_128 preset (input_size 128→119 via preset)
# Used by: HMHP classification 128feat (h10_primary, arcx_h10, opportunity_h10)
#
# The `analysis_ready_128` preset strips 9 dead features → input_size=119.
# NOT compatible with configs that need input_size=128 (no preset, e.g.,
# nvda_hmhp_regression_h10_primary) — those configs override or use a
# dedicated base.
#
# Ownership (per §3.4): data.data_dir, feature_count, feature_preset,
#                        normalization, sequence; model.input_size
_partial: true

data:
  feature_count: 128
  feature_preset: analysis_ready_128
  sequence:
    window_size: 100
    stride: 10
  normalization:
    strategy: hybrid
    eps: 1.0e-8
    clip_value: 10.0
    exclude_features: [93, 115]   # time_regime, time_bucket

model:
  input_size: 119   # 128 feat - 9 dead features (preset)
