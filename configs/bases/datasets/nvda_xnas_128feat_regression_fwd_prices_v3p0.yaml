# axis: datasets
# NVDA XNAS 128-feat regression with forward_prices, v3p0 baseline
# (Phase O Cycle 1, 2026-05-04). Used for HMHP-R / TLOB regression on
# event-based 1000-events/sample exports.
#
# v3p0 (re-extracted with v0.2.1 binaries):
#   schema_version=3.0; contract_version=3.0; idx 97=0.0 RESERVED;
#   lob.book_clears=1/day on every day; 0 NaN/Inf;
#   PRODUCER_DIAGNOSTICS_SCHEMA_VERSION=2.9.0
#
# Shape: 35 days · 51,809 sequences · 2.5 GB ·
#   sequences=(N,100,128) float32 · regression_labels=(N,3) float64 bps
#   forward_prices=(N,311) float64 USD (col 0=t-10, col 10=t, col 310=t+300)
#
# The `nvda_analysis_ready_119_src128_v1` FeatureSet strips 9 dead features
# (indices 68, 69, 76, 77, 92, 94, 96, 97, 102) → input_size=119.
#
# Pre-Phase-O archive at `../data/exports/nvda_xnas_128feat_regression_fwd_prices/`
# (if extant) is read-only and FAILS strict validators per
# `hft-contracts/.../validation.py:115-120` (schema_version="2.2").
#
# Ownership (per §3.4): data.{data_dir, feature_count, feature_set,
#                              normalization, sequence}; model.input_size
_partial: true

data:
  data_dir: "../data/exports/nvda_xnas_128feat_regression_fwd_prices_v3p0"
  feature_count: 128
  feature_set: nvda_analysis_ready_119_src128_v1
  sequence:
    window_size: 100
    stride: 10
  normalization:
    strategy: hybrid
    eps: 1.0e-8
    clip_value: 10.0
    exclude_features: [93, 115]   # time_regime, time_bucket

model:
  input_size: 119   # 128 feat - 9 dead features (FeatureSet-resolved)
