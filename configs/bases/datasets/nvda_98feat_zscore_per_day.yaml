# axis: datasets
# NVDA 98-feat with per-day z-score normalization
# Used by: nvda_tlob_h10_v1, nvda_tlob_h100_v1 (2 configs)
#
# Shared `data_dir: ../data/exports/nvda_11month_complete` is NOT set here
# because it matches configs 1-3's pattern (reusable). But checking goldens:
# h10_v1 AND h100_v1 both point at `nvda_11month_complete` → `data_dir` IS
# safe to include. Inlined here to reduce per-child duplication.
#
# NOTE: differs from `nvda_98feat_triple_barrier.yaml` only in
# `normalization.strategy` (zscore_per_day vs hybrid) — different training
# regime warrants separate base.
#
# Ownership (per §3.4): data.data_dir, feature_count, sources, normalization,
#                        sequence; model.input_size (locked to feature_count).
_partial: true

data:
  data_dir: "../data/exports/nvda_11month_complete"
  feature_count: 98
  sequence:
    window_size: 100
    stride: 10
  normalization:
    strategy: zscore_per_day
    eps: 1.0e-8
    clip_value: 10.0
    exclude_features: [93]   # time_regime (categorical)

model:
  input_size: 98   # locked to data.feature_count per T13
