# axis: datasets
# NVDA E4 time-based 5s bins — 98 features, hybrid normalization
# Used by: E4 TLOB, E4 TemporalRidge (2 configs)
#
# Ownership (per §3.4): data.data_dir, feature_count, sources, normalization,
#                        sequence.{window_size, stride}, model.input_size
#                        (auto-derived — locked to feature_count)
_partial: true

data:
  # v3p0 baseline (Phase O Cycle 1, 2026-05-04): re-extracted with v0.2.1
  # binaries; schema_version=3.0; idx 97=0.0 RESERVED. Pre-Phase-O archive
  # at ../data/exports/e4_timebased_5s/ is read-only; FAILS strict validators.
  data_dir: "../data/exports/e4_timebased_5s_v3p0"
  feature_count: 98
  sequence:
    window_size: 20    # 20 × 5s = 100 seconds of history
    stride: 1          # Every 5-second sample (matches E4 export)
  normalization:
    strategy: hybrid
    eps: 1.0e-8
    clip_value: 10.0
    exclude_features: [93]   # time_regime (categorical)

model:
  input_size: 98   # locked to data.feature_count per T13
