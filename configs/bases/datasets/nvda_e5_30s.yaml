# axis: datasets
# NVDA E5 time-based 30s bins — 98 features, hybrid normalization, 4x data vs 60s
# Used by: E5 30s family (2 configs)
#
# Ownership (per §3.4): data.data_dir, feature_count, sources, normalization,
#                        sequence.{window_size, stride}, model.input_size
#                        (auto-derived — locked to feature_count)
#
# Note: regression_loss_delta is model-side (owned by models/) but varies
# per-dataset due to different kurtosis (30s=12.6 calibrated, 60s=15.1).
# The models/tlob_compact_regression base sets delta=12.6 (60s default);
# 30s children override via child-level `model.regression_loss_delta: 15.1`.
_partial: true

data:
  # v3p0 baseline (Phase O Cycle 1, 2026-05-04): re-extracted with v0.2.1
  # binaries; schema_version=3.0; idx 97=0.0 RESERVED. Pre-Phase-O archive
  # at ../data/exports/e5_timebased_30s/ is read-only; FAILS strict validators.
  data_dir: "../data/exports/e5_timebased_30s_v3p0"
  feature_count: 98
  sequence:
    window_size: 20
    stride: 1
  normalization:
    strategy: hybrid
    eps: 1.0e-8
    clip_value: 10.0
    exclude_features: [93]

model:
  input_size: 98   # locked to data.feature_count per T13
