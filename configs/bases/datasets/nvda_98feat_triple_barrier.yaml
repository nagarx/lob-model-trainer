# axis: datasets
# NVDA 98-feat triple_barrier datasets (11-month exports)
# Used by: nvda_hmhp_triple_barrier_{v1, calibrated, volscaled}
#
# 98-feature export (no experimental features 98-147, no preset).
# `exclude_features: [93]` — only TIME_REGIME categorical is excluded
# (TIME_BUCKET at index 115 is not present in 98-feature exports).
#
# Ownership (per §3.4): data.data_dir, feature_count, normalization, sequence;
#                        model.input_size (no feature_preset here)
_partial: true

data:
  feature_count: 98
  sequence:
    window_size: 100
    stride: 10
  normalization:
    strategy: hybrid
    eps: 1.0e-8
    clip_value: 10.0
    exclude_features: [93]   # time_regime only (115 not in 98-feat)

model:
  input_size: 98
