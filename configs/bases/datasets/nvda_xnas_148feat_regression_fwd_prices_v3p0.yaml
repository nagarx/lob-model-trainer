# axis: datasets
# NVDA XNAS 148-feat regression with forward_prices, v3p0 baseline
# (Phase O Cycle 1 + Option D.A 148-feat extraction, 2026-05-21).
# Used for evaluator-derived FeatureSet integration testing and
# full 50-experimental-feature regression experiments.
#
# v3p0 (extracted with v0.2.1 binaries, commit 11b4413):
#   schema_version=3.0; contract_version=3.0; idx 97=0.0 RESERVED;
#   lob.book_clears=1/day; 0 NaN/Inf;
#   PRODUCER_DIAGNOSTICS_SCHEMA_VERSION=2.9.0
#
# Shape: 233 days . 273,831 sequences . 15 GB .
#   sequences=(N,100,148) float32 . regression_labels=(N,3) float64 bps
#   forward_prices=(N,311) float64 USD
#   horizons=[10, 60, 300]
#
# The `nvda_148feat_v3p0_v1` FeatureSet selects 95 of 148 features
# (80 STRONG-KEEP + 15 KEEP) via `hft-ops evaluate` IC scan (#PY-9
# closure 2026-05-23). content_hash=83803523cd6a1641...
#
# Ownership (per CLAUDE.md Change-Coordination Checklist):
#   data.{data_dir, feature_count, feature_set, normalization, sequence};
#   model.input_size
_partial: true

data:
  data_dir: "../data/exports/nvda_xnas_148feat_regression_fwd_prices_v3p0"
  feature_count: 148
  feature_set: nvda_148feat_v3p0_v1
  sequence:
    window_size: 100
    stride: 10
  normalization:
    strategy: hybrid
    eps: 1.0e-8
    clip_value: 10.0
    exclude_features: [93, 115]   # time_regime, time_bucket (categorical)

model:
  input_size: 95   # 148 feat - 53 excluded by FeatureSet (95 selected)
